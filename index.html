<!DOCTYPE html>
<html>
<head>
<title>System Security</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
font-size:20px;
margin:0;
padding:20px;
overflow:hidden;
}

#terminal{
white-space:pre-line;
height:50vh;
overflow:hidden;
}

.progressBox{
width:100%;
height:25px;
border:2px solid #00ff00;
margin-top:20px;
}

.progress{
height:100%;
width:0%;
background:#00ff00;
}

.warning{
color:red;
font-weight:bold;
text-align:center;
margin-top:20px;
font-size:26px;
animation:blink 0.6s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

</style>
</head>

<body onclick="fullscreen()">

<div id="terminal"></div>

<div class="progressBox">
<div class="progress" id="bar"></div>
</div>

<div id="percent"></div>

<script>

function fullscreen(){
if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen()
}
}

history.pushState(null,null,location.href)

window.onpopstate=function(){
alert("⚠ SYSTEM LOCKED")
history.pushState(null,null,location.href)
}

let lines=[
"Initializing system...",
"Loading kernel...",
"Accessing device memory...",
"Connecting to remote hacker server...",
"Starting data extraction..."
]

let i=0

function typeLine(){

if(i<lines.length){

document.getElementById("terminal").innerHTML+=lines[i]+"\n"

i++

setTimeout(typeLine,900)

}else{

startHack()

}

}

typeLine()

function startHack(){

if(navigator.vibrate){
navigator.vibrate([400,200,400,200,400])
}

let width=0
let bar=document.getElementById("bar")
let percent=document.getElementById("percent")

let interval=setInterval(function(){

if(width>=100){

clearInterval(interval)

document.body.innerHTML+=`
<div class="warning">
⚠ DATA BERHASIL DIAMBIL DAN DIKIRIM KE SERVER ADMIN⚠
</div>
`

startScroll()

}else{

width++

bar.style.width=width+"%"

percent.innerHTML="Proses Ambil Data Perangkat: "+width+"%"

}

},60)

}

function startScroll(){

let terminal=document.getElementById("terminal")

setInterval(function(){

terminal.innerHTML += "Sending data packet to server 192.168.1."+Math.floor(Math.random()*255)+"...\n"

terminal.scrollTop = terminal.scrollHeight

},40)

}

</script>

</body>
</html>
